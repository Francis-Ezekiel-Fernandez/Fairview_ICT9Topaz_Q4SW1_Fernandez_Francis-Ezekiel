<body>
    <center>
    <h1>Switch Statement</h1>
    <button class="btn btn-info" onclick="teamrank()">Rank</button>

    <script>

    function teamrank(){
        var rank = "1st";//string

        message ="";

        switch(true){//boolean
            case (rank === "1st"):
                message = ("RED CHAMPION!");
                break;
            case (rank === "2nd"):
                message = ("u aint us!");
                break;
            case (rank === "3rd"):
                message = ("ur meh!");
                break;
            case (rank === "4th"):
                message = ("ur bad!");
                break;
            default:
                message = ("ur team is trash");
                break;
        }
        alert(message);
    }        

        let team ="redchampion";//string

        switch(team){

        case "blue":

            break;
        case "Green" :
            alert("carried by Erin Urbano")
            break;
        case "yellow" :
            alert("carried by Achilles Obogne")
            break;
        default:
            alert("team not good enough")
        }
    </script>
